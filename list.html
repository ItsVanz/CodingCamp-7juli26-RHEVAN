<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md border border-blue-100">

        <h1 class="text-2xl font-bold text-blue-700 mb-4 border-b-2 border-blue-200 pb-2">
            Unordered List (ul)
        </h1>
        <ul class="list-disc list-inside space-y-2 mb-8">
            <li class="text-blue-600 bg-blue-50 rounded-lg px-4 py-2">Anggur</li>
            <li class="text-blue-600 bg-blue-50 rounded-lg px-4 py-2">Mangga</li>
            <li class="text-blue-600 bg-blue-50 rounded-lg px-4 py-2">Jeruk</li>
        </ul>

        <h1 class="text-2xl font-bold text-blue-700 mb-4 border-b-2 border-blue-200 pb-2">
            Ordered List (ol)
        </h1>
        <ol class="list-decimal list-inside space-y-2">
            <li class="text-white bg-blue-500 rounded-lg px-4 py-2">Nasi Padang</li>
            <li class="text-white bg-blue-500 rounded-lg px-4 py-2">Mie Ayam</li>
            <li class="text-white bg-blue-500 rounded-lg px-4 py-2">Nasi Uduk</li>
        </ol>

    </div>

</body>
</html>
